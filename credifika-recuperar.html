<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credifika — Continuar mi trámite</title>
<style>
  :root {
    --azul: #1B3D6B; --azul-claro: #1E5298; --azul-bg: #EAF0FA; --azul-hover: #142D52;
    --naranja: #E8622A;
    --verde: #1A7A4A; --verde-bg: #EAF7EF;
    --rojo: #C0392B; --rojo-bg: #FDECEB;
    --gris-oscuro: #1A1A1A; --gris-medio: #4A4A4A; --gris-suave: #F5F5F2;
    --borde: #E0E0D8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--gris-suave); color: var(--gris-oscuro); min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: var(--azul); padding: 24px 5%; }
  .logo-img { height: 56px; width: auto; display: block; object-fit: contain; filter: brightness(0) invert(1); cursor: pointer; }

  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 5%; }

  .card {
    background: #fff; border: 1px solid var(--borde); border-radius: 20px;
    padding: 40px 36px; width: 100%; max-width: 460px;
    box-shadow: 0 4px 24px rgba(27,61,107,0.08);
  }

  .card-icon { font-size: 36px; margin-bottom: 14px; }
  .card h1 { font-size: 24px; font-weight: 700; color: var(--azul); letter-spacing: -0.3px; margin-bottom: 6px; }
  .card p { font-size: 14px; color: var(--gris-medio); line-height: 1.6; margin-bottom: 28px; }

  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
  .fg label { font-size: 11px; font-weight: 600; color: var(--gris-medio); text-transform: uppercase; letter-spacing: 0.05em; }
  .fg input {
    padding: 13px 16px; border: 1.5px solid var(--borde); border-radius: 12px;
    font-size: 15px; font-family: inherit; color: var(--gris-oscuro);
    background: #FAFAF8; outline: none; transition: border-color 0.2s;
  }
  .fg input:focus { border-color: var(--azul); background: #fff; }
  .fg input::placeholder { color: #bbb; }

  .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-buscar {
    width: 100%; background: var(--azul); color: #fff;
    border: none; padding: 15px; border-radius: 50px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-buscar:hover { background: var(--azul-hover); transform: translateY(-1px); }
  .btn-buscar:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULTADO */
  .resultado { display: none; margin-top: 20px; border-radius: 14px; padding: 18px 20px; }
  .resultado.encontrado { background: var(--verde-bg); border: 1.5px solid #5bc88a; }
  .resultado.no-encontrado { background: var(--rojo-bg); border: 1.5px solid #e8a09a; }

  .resultado-titulo { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .resultado.encontrado .resultado-titulo { color: var(--verde); }
  .resultado.no-encontrado .resultado-titulo { color: var(--rojo); }

  .resultado-sub { font-size: 13px; line-height: 1.5; color: var(--gris-medio); margin-bottom: 14px; }

  .btn-continuar {
    width: 100%; background: var(--verde); color: #fff;
    border: none; padding: 13px; border-radius: 50px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-continuar:hover { background: #15623b; }

  .btn-nueva {
    width: 100%; background: var(--naranja); color: #fff;
    border: none; padding: 13px; border-radius: 50px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-nueva:hover { background: #c4521f; }

  .sep { border: none; border-top: 1px solid var(--borde); margin: 20px 0; }

  .volver { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gris-medio); }
  .volver a { color: var(--azul-claro); text-decoration: none; font-weight: 500; }
  .volver a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .fg-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="https://static.wixstatic.com/media/4e80a9_da80905d3a444d4a98acfec1fe5ba85d~mv2.png/v1/fill/w_432,h_350,al_c,q_85,enc_avif,quality_auto/credifika_logo_highres%202.png"
       alt="Credifika" class="logo-img" onclick="window.location.href='index.html'" title="Ir al inicio">
</div>

<div class="main">
  <div class="card">
    <div class="card-icon">📂</div>
    <h1>Continuar mi trámite</h1>
    <p>Ingresa tus datos para recuperar el expediente que iniciaste en este navegador. Tus datos se guardan localmente y solo tú tienes acceso a ellos.</p>

    <div class="fg-row">
      <div class="fg">
        <label>Nombre(s)</label>
        <input type="text" id="r_nombre" placeholder="Juan" oninput="limpiarResultado()">
      </div>
      <div class="fg">
        <label>Apellido paterno</label>
        <input type="text" id="r_ap_pat" placeholder="García" oninput="limpiarResultado()">
      </div>
    </div>
    <div class="fg">
      <label>NSS — Número de Seguridad Social</label>
      <input type="text" id="r_nss" placeholder="12345678901" maxlength="11" oninput="limpiarResultado()">
    </div>

    <button class="btn-buscar" onclick="buscarExpediente()">
      Buscar mi expediente →
    </button>

    <div class="resultado" id="resultado">
      <div class="resultado-titulo" id="res-titulo"></div>
      <div class="resultado-sub" id="res-sub"></div>
      <a class="btn-continuar" id="res-btn" href="#" style="display:none">Continuar mi expediente →</a>
      <a class="btn-nueva" href="credifika-precalificacion.html" id="res-nueva" style="display:none">Iniciar trámite nuevo →</a>
    </div>

    <hr class="sep">
    <div class="volver">
      ¿Primera vez aquí? <a href="credifika-precalificacion.html">Verifica tu elegibilidad →</a>
    </div>
  </div>
</div>

<script>
function normalizar(str) {
  return (str || '').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function limpiarResultado() {
  document.getElementById('resultado').style.display = 'none';
}

function buscarExpediente() {
  const nombre = document.getElementById('r_nombre').value.trim();
  const ap_pat = document.getElementById('r_ap_pat').value.trim();
  const nss    = document.getElementById('r_nss').value.trim();

  if (!nombre || !ap_pat || !nss) {
    alert('Por favor llena los 3 campos para buscar tu expediente.');
    return;
  }

  const res       = document.getElementById('resultado');
  const resTitulo = document.getElementById('res-titulo');
  const resSub    = document.getElementById('res-sub');
  const resBtn    = document.getElementById('res-btn');
  const resNueva  = document.getElementById('res-nueva');

  try {
    var saved = JSON.parse(localStorage.getItem('credifika_expediente') || '{}');
    
    var nNombre = normalizar(nombre);
    var nApPat  = normalizar(ap_pat);
    var nNss    = nss.replace(/\s/g, '');

    var sNombre = normalizar(saved['d_nombre'] || '');
    var sApPat  = normalizar(saved['d_ap_pat'] || '');
    var sNss    = (saved['d_nss'] || '').replace(/\s/g, '');

    var match = sNombre === nNombre && sApPat === nApPat && sNss === nNss;
    
    // Also check NSS from precal data
    if (!match && sNss === nNss && sNombre === nNombre) match = true;

    if (match && (saved['d_nombre'] || saved['d_nss'])) {
      // Found!
      var nombreCompleto = [saved['d_nombre'], saved['d_ap_pat'], saved['d_ap_mat']].filter(Boolean).join(' ');
      var docsGuardados = 0;
      var camposLlenos = ['d_nombre','d_ap_pat','d_ap_mat','d_nss','d_curp','d_rfc','d_ciudad','d_telefono','d_email'].filter(function(k) { return saved[k]; }).length;

      res.className = 'resultado encontrado';
      resTitulo.textContent = '✓ Expediente encontrado';
      resSub.textContent = 'Encontramos el expediente de ' + nombreCompleto + ' con ' + camposLlenos + ' de 9 datos personales guardados. Continúa donde lo dejaste.';
      resBtn.style.display = 'block';
      resNueva.style.display = 'none';

      // Build URL params from saved data
      var params = new URLSearchParams({
        nombre:    saved['d_nombre']   || '',
        ap_pat:    saved['d_ap_pat']   || '',
        ap_mat:    saved['d_ap_mat']   || '',
        nss:       saved['d_nss']      || '',
        curp:      saved['d_curp']     || '',
        telefono:  saved['d_telefono'] || '',
        email:     saved['d_email']    || ''
      });
      resBtn.href = 'credifika-expediente.html?' + params.toString();

    } else if (saved['d_nombre'] || saved['d_nss']) {
      // There IS data but it doesn't match
      res.className = 'resultado no-encontrado';
      resTitulo.textContent = '✗ Los datos no coinciden';
      resSub.textContent = 'No encontramos un expediente con esos datos en este navegador. Verifica que el nombre y NSS sean exactamente los mismos que usaste al registrarte.';
      resBtn.style.display = 'none';
      resNueva.style.display = 'block';
    } else {
      // No data at all
      res.className = 'resultado no-encontrado';
      resTitulo.textContent = '✗ No hay expediente guardado';
      resSub.textContent = 'No encontramos ningún trámite en este navegador. Si iniciaste tu expediente en otro dispositivo, deberás empezar de nuevo aquí.';
      resBtn.style.display = 'none';
      resNueva.style.display = 'block';
    }
  } catch(e) {
    res.className = 'resultado no-encontrado';
    resTitulo.textContent = '✗ Error al buscar';
    resSub.textContent = 'Ocurrió un problema al buscar tu expediente. Intenta de nuevo.';
    resBtn.style.display = 'none';
    resNueva.style.display = 'block';
  }

  res.style.display = 'block';
  res.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscarExpediente();
});
</script>
</body>
</html>
